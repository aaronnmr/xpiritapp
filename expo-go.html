<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Xpirit Expo Go</title>
    <style>
      :root {
        color: #080a12;
        background: #f6f8fc;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Inter, sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 15% 15%, rgba(74, 83, 255, 0.18), transparent 30%),
          linear-gradient(160deg, #ffffff 0%, #f5f8ff 48%, #e8efff 100%);
      }

      main {
        width: min(92vw, 520px);
        text-align: center;
        padding: 28px;
      }

      .card {
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid rgba(8, 10, 18, 0.08);
        border-radius: 28px;
        box-shadow: 0 28px 80px rgba(16, 27, 58, 0.16);
        padding: 28px;
      }

      img {
        width: min(72vw, 360px);
        max-width: 100%;
        border-radius: 22px;
        border: 10px solid #ffffff;
        box-shadow: 0 18px 52px rgba(8, 10, 18, 0.12);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(32px, 7vw, 54px);
        letter-spacing: 0;
      }

      p {
        margin: 10px auto 0;
        max-width: 390px;
        color: #5a6072;
        font-size: 16px;
        line-height: 1.55;
      }

      .url {
        display: inline-block;
        margin-top: 18px;
        padding: 10px 14px;
        border-radius: 999px;
        background: #080a12;
        color: #ffffff;
        font-size: 13px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <h1>Xpirit</h1>
        <img src="./expo-go-qr.png" alt="Expo Go QR code for Xpirit" />
        <p>Open Expo Go on your phone and scan this QR. Keep this computer and phone on the same Wi-Fi network.</p>
        <span class="url">exp://192.168.1.24:8081</span>
      </div>
    </main>
  </body>
</html>
